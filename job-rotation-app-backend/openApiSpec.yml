openapi: '3.0.3'
info:
  title: Job Rotation Application APIs
  version: '1.0'
servers:
  - url: https://api.server.test/v1
components:
  schemas:
    ListAllRolesResponse:
      description: Response containing the summary of available roles to be displayed on the employee landing page
      type: object
      required:
        - roleId
        - roleName
        - gradeRequired
        - department
      properties:
        roleId:
          type: string
        roleName:
          type: string
        gradeRequired:
          type: string
        department:
          type: string
    GetRoleDetailsResponse:
      description: Response containing the detailed information of a specific role
      type: object
      required:
        - roleId
        - roleName
        - gradeRequired
        - department
        - staffingManagerEmailAddress
        - duration
        - jobDescription
      properties:
        roleId:
          type: string
        roleName:
          type: string
        gradeRequired:
          type: string
        staffingManagerEmailAddress:
          type: string
        department:
          type: string
        duration:
          type: string
        jobDescription:
          type: string
paths:
  /landing/available-roles:
    get:
      tags:
        - Employee Landing Page
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAllRolesResponse'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /landing/available-roles/{grade}:
    get:
      tags:
        - Employee Landing Page
      parameters:
        - name: grade
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAllRolesResponse'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /landing/available-roles/{department}:
    get:
      tags:
        - Employee Landing Page
      parameters:
        - name: department
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAllRolesResponse'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /landing/available-roles/{duration}:
    get:
      tags:
        - Employee Landing Page
      parameters:
        - name: duration
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAllRolesResponse'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /landing/available-roles/{roleId}:
    get:
      tags:
        - Role Information
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetRoleDetailsResponse'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /staffing-manager/login:
    post:
      tags:
        - Staffing Manager Actions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - emailAddress
                - password
              properties:
                emailAddress:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
  /staffing-manager/get-all-roles:
    get:
      tags:
        - Staffing Manager Actions
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAllRolesResponse'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /staffing-manager/available-roles/{grade}:
    get:
      tags:
        - Staffing Manager Actions  
      parameters:
        - name: grade
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAllRolesResponse'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /staffing-manager/available-roles/{department}:
    get:
      tags:
        - Staffing Manager Actions
      parameters:
        - name: department
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAllRolesResponse'          
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /staffing-manager/available-roles/{duration}:
    get:
      tags:
        - Staffing Manager Actions
      parameters:
        - name: duration
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAllRolesResponse'  
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /staffing-manager/available-roles/{roleId}:
    get:
      tags:
        - Role Information
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetRoleDetailsResponse'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /staffing-manager/create-role:
    post:
      tags:
        - Staffing Manager Actions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - roleName
                - gradeRequired
                - department
                - duration
                - jobDescription
                - staffingManagerEmailAddress
              properties:
                roleName:
                  type: string
                gradeRequired:
                  type: string
                department:
                  type: string
                duration:
                  type: string
                jobDescription:
                  type: string
                staffingManagerEmailAddress:
                  type: string
      responses:
        '201':
          description: Created
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /staffing-manager/update-role/{roleId}:
    put:
      tags:
        - Staffing Manager Actions
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - roleName
                - gradeRequired
                - department
                - duration
                - jobDescription
                - staffingManagerEmailAddress
              properties:
                roleName:
                  type: string
                gradeRequired:
                  type: string
                department:
                  type: string
                duration:
                  type: string
                jobDescription:
                  type: string
                staffingManagerEmailAddress:
                  type: string
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /staffing-manager/delete-role/{roleId}:
    delete:
      tags:
        - Staffing Manager Actions
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK 
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error